<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCS-API - Landing Page</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      background-attachment: fixed;
      color: #2c3e50;
      text-align: center;
      padding: 80px 20px;
      position: relative;
      min-height: 100vh;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 25% 25%, rgba(230, 126, 34, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(52, 152, 219, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    h1 {
      font-size: 3.5em;
      color: #e67e22;
      margin-bottom: 20px;
      text-shadow: 2px 4px 8px rgba(0,0,0,0.1);
      font-weight: 300;
    }
    p {
      font-size: 1.2em;
      margin: 20px 0;
    }
    .hidden {
      display: none;
    }
    .login-box {
      background: linear-gradient(145deg, #ffffff, #f8f9fa);
      border: none;
      padding: 40px 30px;
      border-radius: 20px;
      width: 350px;
      margin: 30px auto;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.1),
        0 15px 25px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      animation: slideUp 0.5s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #e67e22, #f39c12, #e67e22);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    
    .login-box h3 {
      margin: 0 0 30px 0;
      font-size: 1.8em;
      color: #2c3e50;
      font-weight: 300;
      position: relative;
    }
    
    .login-box h3::after {
      content: '🔐';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8em;
    }
    
    .input-group {
      position: relative;
      margin: 25px 0;
    }
    
    input {
      display: block;
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1em;
      background: rgba(255,255,255,0.8);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    input:focus {
      outline: none;
      border-color: #e67e22;
      background: white;
      box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
      transform: translateY(-2px);
    }
    
    input::placeholder {
      color: #95a5a6;
      font-weight: 300;
    }
    
    button {
      padding: 16px 24px;
      background: linear-gradient(145deg, #e67e22, #d35400);
      border: none;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-size: 1.1em;
      font-weight: 600;
      margin-top: 20px;
      transition: all 0.3s ease;
      box-shadow: 
        0 8px 16px rgba(230, 126, 34, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }
    
    button:hover {
      background: linear-gradient(145deg, #d35400, #c0392b);
      transform: translateY(-3px);
      box-shadow: 
        0 12px 24px rgba(230, 126, 34, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }
    
    button:active {
      transform: translateY(-1px);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Visual feedback for pin entry */
    .pin-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 2em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pin-indicator.show {
      opacity: 0.7;
    }
    
    /* Subtle visual cue */
    .typing-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9em;
      color: #888;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>🚧 NeuroCluster Streamer Algorithm - API 🚧</h1>
  <p>Our new website is currently under construction.<br>
  Stay tuned!</p>
  <p>💡...</p>
  
  <!-- Visual feedback for pin entry -->
  <div id="pinIndicator" class="pin-indicator">🔑</div>
  
  <!-- Hidden Login Box -->
  <div id="loginBox" class="login-box hidden">
    <h3>Admin Access</h3>
    <div class="input-group">
      <input type="text" id="username" placeholder="👤 Username">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="🔒 Password">
    </div>
    <button onclick="checkLogin()">✨ Login</button>
  </div>
  
  <div class="typing-hint"></div>
  
  <script>
    const correctPin = "1234"; // 🔑 Set your secret pin here
    const correctUser = "admin"; // 👤 Set your username
    const correctPass = "wacheewire"; // 🔒 Set your password
    
    let enteredPin = "";
    let pinTimeout;
    
    const loginBox = document.getElementById("loginBox");
    const pinIndicator = document.getElementById("pinIndicator");
    
    // Listen for keystrokes anywhere on the page
    document.addEventListener("keydown", function(event) {
      // Ignore if login box is visible (so user can type in login fields)
      if (!loginBox.classList.contains("hidden")) {
        return;
      }
      
      // Only capture number keys and backspace
      if (event.key >= "0" && event.key <= "9") {
        enteredPin += event.key;
        
        // Show visual feedback
        pinIndicator.classList.add("show");
        
        // Clear the feedback after a short delay
        clearTimeout(pinTimeout);
        pinTimeout = setTimeout(() => {
          pinIndicator.classList.remove("show");
        }, 500);
        
        // Check if pin is correct
        if (enteredPin === correctPin) {
          loginBox.classList.remove("hidden");
          enteredPin = ""; // Reset for security
        } else if (enteredPin.length >= correctPin.length) {
          // Wrong pin, reset after a moment
          setTimeout(() => {
            enteredPin = "";
          }, 1000);
        }
        
        event.preventDefault();
      } else if (event.key === "Backspace") {
        enteredPin = enteredPin.slice(0, -1);
        event.preventDefault();
      }
    });
    
    // Check login
    function checkLogin() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      
      if (user === correctUser && pass === correctPass) {
        window.location.href = "main.html"; // redirect to main page
      } else {
        alert("Invalid credentials!");
      }
    }
    
    // Focus the page so it can capture keystrokes immediately
    window.addEventListener("load", function() {
      document.body.focus();
    });
  </script>
</body>
</html>
